<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="AfroMuziki - Premium African music and video streaming platform. Discover the best African artists, albums, and videos.">
  <meta name="keywords" content="african music, afrobeat, amapiano, streaming, african artists">
  <meta name="author" content="AfroMuziki">
  <meta property="og:title" content="AfroMuziki - African Music Streaming">
  <meta property="og:description" content="Stream the best African music and videos">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://afromuziki.com">
  <title>AfroMuziki - Premium African Music & Video Streaming</title>
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s ease-out;
    }
    .animate-pulse-slow {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .content-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .content-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }
    .gradient-text {
      background: linear-gradient(135deg, #1E3A8A 0%, #D97706 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
  <div id="app" class="min-h-screen">
    <!-- Premium Header -->
    <header class="glass-effect sticky top-0 z-50 border-b border-gray-200">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center space-x-2 cursor-pointer" onclick="navigateTo('home')">
            <div class="w-8 h-8 bg-gradient-to-r from-blue-900 to-yellow-600 rounded-lg flex items-center justify-center">
              <span class="text-white font-bold text-xl">A</span>
            </div>
            <span class="text-xl font-bold gradient-text">AfroMuziki</span>
          </div>
          
          <div class="hidden md:flex items-center space-x-8">
            <button onclick="navigateTo('home')" class="text-gray-700 hover:text-blue-900 font-medium transition">Home</button>
            <button onclick="navigateTo('browse')" class="text-gray-700 hover:text-blue-900 font-medium transition">Browse</button>
            <button onclick="navigateTo('trending')" class="text-gray-700 hover:text-blue-900 font-medium transition">Trending</button>
            <button onclick="navigateTo('charts')" class="text-gray-700 hover:text-blue-900 font-medium transition">Charts</button>
          </div>
          
          <div class="flex items-center space-x-4">
            <button onclick="toggleSearch()" class="p-2 hover:bg-gray-100 rounded-full transition">
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </button>
            <button id="auth-button" onclick="handleAuth()" class="bg-gradient-to-r from-blue-900 to-blue-800 text-white px-5 py-2 rounded-full font-medium hover:shadow-lg transition">Sign In</button>
          </div>
        </div>
        
        <!-- Search Bar -->
        <div id="search-container" class="hidden py-4 animate-fade-in">
          <div class="relative">
            <input type="text" id="search-input" placeholder="Search for artists, songs, albums..." 
                   class="w-full px-5 py-3 pl-12 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <div id="search-results" class="mt-4 space-y-2"></div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex justify-center items-center h-96">
        <div class="text-center">
          <div class="inline-block w-12 h-12 border-4 border-blue-900 border-t-transparent rounded-full animate-spin"></div>
          <p class="mt-4 text-gray-500">Loading AfroMuziki experience...</p>
        </div>
      </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 md:hidden glass-effect">
      <div class="flex justify-around py-2">
        <button onclick="navigateTo('home')" class="flex flex-col items-center p-2 text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          <span class="text-xs mt-1">Home</span>
        </button>
        <button onclick="navigateTo('browse')" class="flex flex-col items-center p-2 text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
          </svg>
          <span class="text-xs mt-1">Browse</span>
        </button>
        <button onclick="navigateTo('library')" class="flex flex-col items-center p-2 text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
          </svg>
          <span class="text-xs mt-1">Library</span>
        </button>
        <button onclick="navigateTo('profile')" class="flex flex-col items-center p-2 text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          <span class="text-xs mt-1">Profile</span>
        </button>
      </div>
    </nav>
  </div>

  <script>
    // ============ CONFIGURATION ============
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : 'https://afromuziki-backend.onrender.com';
    let currentUser = null;
    let currentPage = 'home';
    let allContent = [];

    // ============ NAVIGATION ============
    function navigateTo(page) {
      currentPage = page;
      if (page === 'home') loadHomePage();
      else if (page === 'browse') loadBrowsePage();
      else if (page === 'trending') loadTrendingPage();
      else if (page === 'charts') loadChartsPage();
      else if (page === 'library') loadLibraryPage();
      else if (page === 'profile') loadProfilePage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleSearch() {
      const container = document.getElementById('search-container');
      container.classList.toggle('hidden');
      if (!container.classList.contains('hidden')) {
        document.getElementById('search-input').focus();
      }
    }

    function handleAuth() {
      if (currentUser) {
        currentUser = null;
        document.getElementById('auth-button').innerHTML = 'Sign In';
        navigateTo('home');
      } else {
        showAuthModal();
      }
    }

    // ============ HOME PAGE ============
    async function loadHomePage() {
      showLoading();
      try {
        const [featuredRes, trendingRes, recentRes] = await Promise.all([
          fetch(`${API_URL}/api/content?sort=popular&limit=6`).then(r => r.json()),
          fetch(`${API_URL}/api/content?sort=trending&limit=8`).then(r => r.json()),
          fetch(`${API_URL}/api/content?sort=newest&limit=8`).then(r => r.json())
        ]);

        const html = `
          <div class="animate-fade-in">
            <!-- Hero Section -->
            <div class="relative rounded-2xl overflow-hidden mb-12 bg-gradient-to-r from-blue-900 to-purple-800">
              <div class="absolute inset-0 bg-black opacity-20"></div>
              <div class="relative px-6 py-12 md:py-20 text-white text-center">
                <h1 class="text-4xl md:text-6xl font-bold mb-4">Discover African Music</h1>
                <p class="text-lg md:text-xl mb-8 opacity-90">Stream the best African artists, albums, and videos</p>
                <button onclick="navigateTo('browse')" class="bg-yellow-500 text-blue-900 px-8 py-3 rounded-full font-semibold hover:bg-yellow-400 transition shadow-lg">
                  Start Exploring
                </button>
              </div>
            </div>

            <!-- Featured Artists -->
            <div class="mb-12">
              <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Featured Artists</h2>
                <button onclick="navigateTo('browse')" class="text-blue-600 hover:text-blue-700 font-medium">View All</button>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                ${['Burna Boy', 'Wizkid', 'Davido', 'Rema', 'Tems', 'Ayra Starr'].map(artist => `
                  <div class="text-center cursor-pointer" onclick="searchArtist('${artist}')">
                    <div class="w-24 h-24 md:w-32 md:h-32 mx-auto bg-gradient-to-br from-gray-200 to-gray-300 rounded-full flex items-center justify-center mb-2 hover:scale-105 transition">
                      <span class="text-4xl">🎤</span>
                    </div>
                    <p class="font-medium text-gray-800">${artist}</p>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Trending Now -->
            <div class="mb-12">
              <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Trending Now</h2>
                <button onclick="navigateTo('trending')" class="text-blue-600 hover:text-blue-700 font-medium">View All</button>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                ${trendingRes.data && trendingRes.data.length > 0 ? trendingRes.data.map(item => renderContentCard(item)).join('') : '<p class="text-gray-500 col-span-4 text-center">No trending content yet</p>'}
              </div>
            </div>

            <!-- New Releases -->
            <div class="mb-12">
              <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">New Releases</h2>
                <button onclick="navigateTo('browse')" class="text-blue-600 hover:text-blue-700 font-medium">View All</button>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                ${recentRes.data && recentRes.data.length > 0 ? recentRes.data.map(item => renderContentCard(item)).join('') : '<p class="text-gray-500 col-span-4 text-center">No new releases</p>'}
              </div>
            </div>

            <!-- Premium CTA -->
            <div class="bg-gradient-to-r from-yellow-500 to-yellow-600 rounded-2xl p-8 text-center">
              <h3 class="text-2xl font-bold text-blue-900 mb-2">Go Premium</h3>
              <p class="text-blue-800 mb-4">Get unlimited streaming, offline downloads, and exclusive content</p>
              <button class="bg-blue-900 text-white px-6 py-2 rounded-full font-semibold hover:bg-blue-800 transition">Upgrade Now</button>
            </div>
          </div>
        `;
        
        document.getElementById('main-content').innerHTML = html;
      } catch (error) {
        showError('Failed to load home page');
      }
    }

    // ============ BROWSE PAGE ============
    async function loadBrowsePage() {
      showLoading();
      try {
        const response = await fetch(`${API_URL}/api/content?limit=24`);
        const data = await response.json();
        allContent = data.data || [];

        const genres = ['All', 'Afrobeat', 'Amapiano', 'Highlife', 'Bongo Flava', 'Soukous', 'Mbalax', 'Kizomba', 'Gospel', 'Hip Hop', 'R&B'];
        
        const html = `
          <div class="animate-fade-in">
            <div class="mb-8">
              <h1 class="text-3xl font-bold text-gray-900 mb-2">Browse Music</h1>
              <p class="text-gray-600">Discover new sounds from across Africa</p>
            </div>
            
            <!-- Genre Filters -->
            <div class="flex overflow-x-auto space-x-2 mb-8 pb-2 scrollbar-hide">
              ${genres.map(genre => `
                <button onclick="filterByGenre('${genre}')" class="genre-filter px-5 py-2 rounded-full whitespace-nowrap transition ${genre === 'All' ? 'bg-blue-900 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}">
                  ${genre}
                </button>
              `).join('')}
            </div>
            
            <!-- Sort Options -->
            <div class="flex justify-end mb-6">
              <select onchange="sortContent(this.value)" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="trending">Most Viewed</option>
                <option value="popular">Most Liked</option>
                <option value="newest">Newest First</option>
              </select>
            </div>
            
            <!-- Content Grid -->
            <div id="browse-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              ${data.data && data.data.length > 0 ? data.data.map(item => renderContentCard(item)).join('') : '<p class="text-gray-500 col-span-4 text-center py-12">No content available</p>'}
            </div>
          </div>
        `;
        
        document.getElementById('main-content').innerHTML = html;
      } catch (error) {
        showError('Failed to load browse page');
      }
    }

    // ============ CONTENT CARD RENDERER ============
    function renderContentCard(item) {
      const typeIcon = item.type === 'audio' ? '🎵' : '🎬';
      return `
        <div class="bg-white rounded-xl overflow-hidden shadow-sm content-card cursor-pointer" onclick="viewContent('${item.id}')">
          <div class="relative">
            <img src="${item.thumbnail_url || 'https://via.placeholder.com/400x250?text=No+Image'}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/400x250?text=AfroMuziki'">
            <div class="absolute top-2 right-2 bg-black bg-opacity-70 text-white text-xs px-2 py-1 rounded">
              ${typeIcon}
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-semibold text-gray-900 mb-1 line-clamp-1">${escapeHtml(item.title)}</h3>
            <p class="text-sm text-gray-500 mb-2">${item.artist?.full_name || item.artist?.username || 'Unknown Artist'}</p>
            <div class="flex justify-between items-center text-xs text-gray-400">
              <span>👁️ ${(item.views || 0).toLocaleString()}</span>
              <span>❤️ ${(item.likes_count || 0).toLocaleString()}</span>
              <span>💬 ${(item.comments_count || 0).toLocaleString()}</span>
            </div>
          </div>
        </div>
      `;
    }

    // ============ CONTENT DETAIL PAGE ============
    async function viewContent(id) {
      showLoading();
      try {
        const response = await fetch(`${API_URL}/api/content/${id}`);
        const data = await response.json();
        
        if (!data.success || !data.data) throw new Error('Content not found');
        
        const content = data.data;
        
        const html = `
          <div class="animate-fade-in max-w-4xl mx-auto">
            <!-- Media Player -->
            <div class="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl overflow-hidden shadow-xl mb-8">
              <div class="relative">
                <img src="${content.thumbnail_url || 'https://via.placeholder.com/1200x600'}" class="w-full h-64 md:h-96 object-cover">
                <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center">
                  <button onclick="playContent('${content.url}', '${content.type}')" class="w-20 h-20 bg-white rounded-full flex items-center justify-center hover:scale-110 transition">
                    <svg class="w-10 h-10 text-gray-900 ml-1" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M8 5v14l11-7z"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            
            <!-- Content Info -->
            <div class="mb-8">
              <h1 class="text-3xl font-bold text-gray-900 mb-2">${escapeHtml(content.title)}</h1>
              <div class="flex items-center space-x-4 mb-4">
                <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">${content.type === 'audio' ? 'Audio' : 'Video'}</span>
                <span class="text-gray-500">${content.genre || 'Uncategorized'}</span>
                <span class="text-gray-500">👁️ ${(content.views || 0).toLocaleString()} views</span>
                <button onclick="likeContent('${content.id}')" class="flex items-center space-x-1 text-red-500 hover:text-red-600 transition">
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                  </svg>
                  <span>${(content.likes_count || 0).toLocaleString()}</span>
                </button>
              </div>
              <p class="text-gray-600 leading-relaxed">${escapeHtml(content.description || 'No description available')}</p>
            </div>
            
            <!-- Artist Section -->
            <div class="bg-white rounded-xl p-6 mb-8 shadow-sm">
              <h3 class="font-semibold text-lg mb-4">About the Artist</h3>
              <div class="flex items-center space-x-4">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-500 rounded-full flex items-center justify-center text-white text-2xl">
                  ${content.artist?.full_name?.charAt(0) || content.artist?.username?.charAt(0) || 'A'}
                </div>
                <div>
                  <p class="font-semibold text-gray-900">${content.artist?.full_name || content.artist?.username || 'Unknown Artist'}</p>
                  <p class="text-sm text-gray-500">${content.artist?.followers_count || 0} followers</p>
                  <button onclick="followArtist('${content.artist_id}')" class="mt-2 text-sm bg-blue-600 text-white px-4 py-1 rounded-full hover:bg-blue-700 transition">Follow</button>
                </div>
              </div>
            </div>
            
            <!-- Comments Section -->
            <div class="bg-white rounded-xl p-6 shadow-sm">
              <h3 class="font-semibold text-lg mb-4">Comments (${content.comments?.length || 0})</h3>
              <div id="comments-container" class="space-y-4 mb-6">
                ${content.comments && content.comments.length > 0 ? content.comments.map(comment => `
                  <div class="flex space-x-3">
                    <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                      ${comment.user?.full_name?.charAt(0) || comment.user?.username?.charAt(0) || 'U'}
                    </div>
                    <div class="flex-1">
                      <p class="font-medium text-sm">${comment.user?.full_name || comment.user?.username || 'Anonymous'}</p>
                      <p class="text-gray-600 text-sm">${escapeHtml(comment.body)}</p>
                      <p class="text-xs text-gray-400 mt-1">${new Date(comment.created_at).toLocaleDateString()}</p>
                    </div>
                  </div>
                `).join('') : '<p class="text-gray-500 text-center">No comments yet. Be the first to comment!</p>'}
              </div>
              
              ${currentUser ? `
                <div class="flex space-x-3">
                  <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                    ${currentUser.email?.charAt(0).toUpperCase() || 'U'}
                  </div>
                  <div class="flex-1">
                    <textarea id="comment-text" placeholder="Share your thoughts..." class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" rows="2"></textarea>
                    <button onclick="addComment('${content.id}')" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition">Post Comment</button>
                  </div>
                </div>
              ` : '<p class="text-center text-gray-500">Please sign in to leave a comment</p>'}
            </div>
          </div>
        `;
        
        document.getElementById('main-content').innerHTML = html;
      } catch (error) {
        showError('Failed to load content');
      }
    }

    // ============ UTILITY FUNCTIONS ============
    function showLoading() {
      document.getElementById('main-content').innerHTML = `
        <div class="flex justify-center items-center h-64">
          <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-blue-900 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-500">Loading...</p>
          </div>
        </div>
      `;
    }

    function showError(message) {
      document.getElementById('main-content').innerHTML = `
        <div class="text-center py-12">
          <svg class="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <h3 class="text-xl font-semibold text-gray-900 mb-2">Something went wrong</h3>
          <p class="text-gray-600">${message}</p>
          <button onclick="navigateTo('home')" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg">Go Home</button>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
